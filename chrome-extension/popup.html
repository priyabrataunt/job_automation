<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Job Tracker Auto-Fill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      background: #11111b;
      color: #cdd6f4;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #89b4fa; }
    .header .subtitle { font-size: 11px; color: #6c7086; margin-top: 2px; }
    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .section {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #a6adc8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 9px 0;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1e66f5; color: #fff; }
    .btn-purple  { background: #8839ef; color: #fff; }
    .btn-green   { background: #40a02b; color: #fff; }
    .btn-subtle  { background: #313244; color: #cdd6f4; }
    .btn + .btn  { margin-top: 6px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #40a02b; }
    .dot-yellow { background: #df8e1d; }
    .dot-red    { background: #d20f39; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
    }
    .badge-blue   { background: #1e3a5f; color: #89b4fa; }
    .badge-green  { background: #1e4620; color: #a6e3a1; }
    .badge-yellow { background: #3b2c00; color: #f9e2af; }
    .badge-red    { background: '#3b1c1c'; color: '#f38ba8'; }

    #cl-output {
      width: 100%;
      min-height: 120px;
      background: #181825;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 11px;
      line-height: 1.6;
      padding: 10px;
      resize: vertical;
      margin-top: 8px;
      font-family: system-ui, sans-serif;
    }
    #msg {
      font-size: 11px;
      color: #a6e3a1;
      min-height: 16px;
      text-align: center;
    }
    #err {
      font-size: 11px;
      color: #f38ba8;
      min-height: 16px;
      text-align: center;
    }

    .field-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .field-tag {
      background: #1e4620; color: #a6e3a1;
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
    }
    .field-tag.ai {
      background: #1e3a5f; color: #89b4fa;
    }
    .field-tag.missed {
      background: #3b1c1c; color: #f38ba8;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🎯 Job Tracker Auto-Fill</h1>
      <div class="subtitle" id="page-ats">Detecting page...</div>
    </div>
  </div>

  <div class="body">

    <!-- Page status -->
    <div class="section">
      <div class="section-title">Page Detection</div>
      <div class="status-row">
        <div class="dot" id="ats-dot" style="background:#45475a"></div>
        <span id="ats-label">Scanning...</span>
      </div>
      <div id="field-summary" class="field-list" style="margin-top:8px;display:none"></div>
    </div>

    <!-- Auto-fill -->
    <div class="section">
      <div class="section-title">Auto-Fill</div>
      <button class="btn btn-primary" id="btn-autofill">⚡ Auto-Fill This Form</button>
    </div>

    <!-- Cover Letter -->
    <div class="section">
      <div class="section-title">Cover Letter</div>
      <button class="btn btn-purple" id="btn-coverletter">✉️ Generate Cover Letter (Claude)</button>
      <textarea id="cl-output" placeholder="Generated cover letter will appear here..." style="display:none"></textarea>
      <button class="btn btn-subtle" id="btn-copy" style="display:none;margin-top:6px">📋 Copy to Clipboard</button>
    </div>

    <!-- Mark Applied -->
    <div class="section">
      <div class="section-title">Track Application</div>
      <button class="btn btn-green" id="btn-applied">✅ Mark as Applied in Job Tracker</button>
    </div>

    <div id="msg"></div>
    <div id="err"></div>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
